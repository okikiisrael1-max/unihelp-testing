<svg width="500" height="300" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="300" fill="#ffffff"/>

  <!-- Magnets -->
  <rect x="50" y="90" width="70" height="120" fill="#2563eb"/>
  <text x="78" y="160" font-size="28" fill="#fff">N</text>

  <rect x="380" y="90" width="70" height="120" fill="#dc2626"/>
  <text x="408" y="160" font-size="28" fill="#fff">S</text>

  <!-- Coil -->
  <rect x="180" y="100" width="140" height="100"
        fill="none"
        stroke="#000"
        stroke-width="5"/>

  <!-- Shaft -->
  <line x1="250" y1="70" x2="250" y2="230"
        stroke="#000"
        stroke-width="5"/>

  <!-- Brushes -->
  <line x1="150" y1="250" x2="220" y2="210"
        stroke="#000"
        stroke-width="4"/>

  <line x1="350" y1="250" x2="280" y2="210"
        stroke="#000"
        stroke-width="4"/>

  <!-- Battery -->
  <line x1="180" y1="260" x2="180" y2="290"
        stroke="#000"
        stroke-width="4"/>

  <line x1="200" y1="250" x2="200" y2="300"
        stroke="#000"
        stroke-width="4"/>

  <text x="170" y="45" font-size="22">
    Electric Motor
  </text>
</svg>