
<svg width="700" height="420" viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="420" fill="#ffffff"/>

  <!-- Title -->
  <text x="180" y="45"
        font-size="28"
        font-family="Arial"
        fill="#111827">
    Separation of Powers
  </text>

  <!-- Legislature Box -->
  <rect x="70" y="120"
        width="170"
        height="110"
        rx="18"
        fill="#dbeafe"
        stroke="#2563eb"
        stroke-width="4"/>

  <text x="105" y="170"
        font-size="26"
        font-family="Arial"
        fill="#1e3a8a">
    Legislature
  </text>

  <text x="92" y="205"
        font-size="16"
        font-family="Arial"
        fill="#1f2937">
    Makes Laws
  </text>

  <!-- Executive Box -->
  <rect x="265" y="120"
        width="170"
        height="110"
        rx="18"
        fill="#dcfce7"
        stroke="#16a34a"
        stroke-width="4"/>

  <text x="315" y="170"
        font-size="26"
        font-family="Arial"
        fill="#166534">
    Executive
  </text>

  <text x="295" y="205"
        font-size="16"
        font-family="Arial"
        fill="#1f2937">
    Implements Laws
  </text>

  <!-- Judiciary Box -->
  <rect x="460" y="120"
        width="170"
        height="110"
        rx="18"
        fill="#fee2e2"
        stroke="#dc2626"
        stroke-width="4"/>

  <text x="505" y="170"
        font-size="26"
        font-family="Arial"
        fill="#991b1b">
    Judiciary
  </text>

  <text x="495" y="205"
        font-size="16"
        font-family="Arial"
        fill="#1f2937">
    Interprets Laws
  </text>

  <!-- Connecting arrows -->
  <line x1="240" y1="175"
        x2="265" y2="175"
        stroke="#000"
        stroke-width="3"/>

  <polygon points="265,175 252,168 252,182"
           fill="#000"/>

  <line x1="435" y1="175"
        x2="460" y2="175"
        stroke="#000"
        stroke-width="3"/>

  <polygon points="460,175 447,168 447,182"
           fill="#000"/>

  <!-- Bottom explanation -->
  <rect x="110" y="300"
        width="480"
        height="65"
        rx="14"
        fill="#f3f4f6"
        stroke="#9ca3af"
        stroke-width="2"/>

  <text x="140" y="338"
        font-size="18"
        font-family="Arial"
        fill="#111827">
    Each arm performs separate functions to prevent abuse of power.
  </text>
</svg>