<svg width="500" height="260" viewBox="0 0 500 260" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="260" fill="#ffffff"/>

  <!-- Highlighted Halogens -->
  <rect x="340" y="40" width="60" height="50"
        fill="#fde68a"
        stroke="#000"
        stroke-width="2"/>
  <text x="360" y="70" font-size="18">F</text>

  <rect x="340" y="90" width="60" height="50"
        fill="#fde68a"
        stroke="#000"
        stroke-width="2"/>
  <text x="358" y="120" font-size="18">Cl</text>

  <rect x="340" y="140" width="60" height="50"
        fill="#fde68a"
        stroke="#000"
        stroke-width="2"/>
  <text x="360" y="170" font-size="18">Br</text>

  <rect x="340" y="190" width="60" height="50"
        fill="#fde68a"
        stroke="#000"
        stroke-width="2"/>
  <text x="362" y="220" font-size="18">I</text>

  <!-- Noble gases -->
  <rect x="410" y="40" width="60" height="50"
        fill="#bfdbfe"
        stroke="#000"
        stroke-width="2"/>
  <text x="430" y="70" font-size="18">Ne</text>

  <rect x="410" y="90" width="60" height="50"
        fill="#bfdbfe"
        stroke="#000"
        stroke-width="2"/>
  <text x="430" y="120" font-size="18">Ar</text>

  <!-- Label -->
  <text x="120" y="25" font-size="22">
    Section of the Periodic Table
  </text>

  <text x="120" y="240" font-size="18">
    Highlighted Group = Halogens
  </text>
</svg>