<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="420" fill="#ffffff"/>

  <text x="250" y="40"
        font-size="26"
        font-family="Arial"
        fill="#111827">
    Electoral Process
  </text>

  <!-- Boxes -->
  <rect x="50" y="120" width="130" height="70" rx="12"
        fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="85" y="160" font-size="16" font-family="Arial">Voters</text>

  <rect x="220" y="120" width="130" height="70" rx="12"
        fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="250" y="150" font-size="16" font-family="Arial">Voting</text>
  <text x="240" y="170" font-size="14" font-family="Arial">Ballot Casting</text>

  <rect x="390" y="120" width="130" height="70" rx="12"
        fill="#fef9c3" stroke="#ca8a04" stroke-width="3"/>
  <text x="415" y="160" font-size="16" font-family="Arial">Counting</text>

  <rect x="560" y="120" width="150" height="70" rx="12"
        fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="595" y="160" font-size="16" font-family="Arial">Results</text>

  <!-- Arrows -->
  <line x1="180" y1="155" x2="220" y2="155"
        stroke="#000" stroke-width="3"/>
  <polygon points="220,155 208,148 208,162" fill="#000"/>

  <line x1="350" y1="155" x2="390" y2="155"
        stroke="#000" stroke-width="3"/>
  <polygon points="390,155 378,148 378,162" fill="#000"/>

  <line x1="520" y1="155" x2="560" y2="155"
        stroke="#000" stroke-width="3"/>
  <polygon points="560,155 548,148 548,162" fill="#000"/>

  <!-- Extra process -->
  <rect x="220" y="260" width="170" height="70" rx="12"
        fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
  <text x="240" y="290" font-size="15" font-family="Arial">
    Electoral Commission
  </text>
  <text x="245" y="310" font-size="13" font-family="Arial">
    (INEC Supervision)
  </text>

  <line x1="285" y1="190" x2="285" y2="260"
        stroke="#000" stroke-width="3"/>
  <polygon points="285,260 278,248 292,248" fill="#000"/>

  <line x1="285" y1="330" x2="285" y2="370"
        stroke="#000" stroke-width="3"/>
  <polygon points="285,370 278,358 292,358" fill="#000"/>

  <text x="420" y="370" font-size="14" font-family="Arial">
    Free and fair elections lead to democratic governance
  </text>
</svg>
