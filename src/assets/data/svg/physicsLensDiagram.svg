
<svg width="500" height="260" viewBox="0 0 500 260" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="260" fill="#ffffff"/>

  <!-- Principal axis -->
  <line x1="40" y1="130" x2="460" y2="130"
        stroke="#000"
        stroke-width="3"/>

  <!-- Convex Lens -->
  <path d="M240 50 Q280 130 240 210"
        fill="#bfdbfe"
        stroke="#2563eb"
        stroke-width="4"/>

  <path d="M260 50 Q220 130 260 210"
        fill="#bfdbfe"
        stroke="#2563eb"
        stroke-width="4"/>

  <!-- Object arrow -->
  <line x1="100" y1="130" x2="100" y2="70"
        stroke="#000"
        stroke-width="4"/>

  <polygon points="100,60 92,75 108,75"
           fill="#000"/>

  <!-- Rays -->
  <line x1="100" y1="70" x2="250" y2="70"
        stroke="#ef4444"
        stroke-width="3"/>

  <line x1="250" y1="70" x2="400" y2="130"
        stroke="#ef4444"
        stroke-width="3"/>

  <line x1="100" y1="70" x2="250" y2="130"
        stroke="#10b981"
        stroke-width="3"/>

  <line x1="250" y1="130" x2="400" y2="130"
        stroke="#10b981"
        stroke-width="3"/>

  <!-- Image -->
  <line x1="400" y1="130" x2="400" y2="170"
        stroke="#000"
        stroke-width="4"/>

  <polygon points="400,180 392,165 408,165"
           fill="#000"/>

  <text x="185" y="30" font-size="20">
    Convex Lens Ray Diagram
  </text>
</svg>