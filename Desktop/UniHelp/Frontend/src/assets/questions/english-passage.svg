<svg width="700" height="400" viewBox="0 0 700 400" fill="none" xmlns="http://www.w3.org/2000/svg">

  <rect width="700" height="400" rx="24" fill="#111827"/>

  <rect x="40" y="40" width="620" height="320" rx="18" fill="#1E293B"/>

  <text x="70" y="90" fill="#ffffff" font-size="22" font-family="Georgia" font-weight="bold">
    COMPREHENSION PASSAGE
  </text>

  <text x="70" y="140" fill="#CBD5E1" font-size="18" font-family="Georgia">
    The young boy was determined to succeed despite all obstacles.
  </text>

  <text x="70" y="175" fill="#CBD5E1" font-size="18" font-family="Georgia">
    He studied tirelessly every day and remained focused on his goals.
  </text>

  <text x="70" y="210" fill="#CBD5E1" font-size="18" font-family="Georgia">
    Even when others discouraged him, he continued striving for excellence.
  </text>

  <text x="70" y="270" fill="#A5B4FC" font-size="18" font-family="Arial">
    Read the passage carefully and answer the question below.
  </text>

</svg>