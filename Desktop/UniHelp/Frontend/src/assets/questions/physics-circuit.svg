<svg width="600" height="300" viewBox="0 0 600 300" fill="none" xmlns="http://www.w3.org/2000/svg">

  <rect width="600" height="300" rx="24" fill="#020617"/>

  <!-- Wires -->
  <line x1="100" y1="150" x2="220" y2="150" stroke="#ffffff" stroke-width="5"/>

  <line x1="380" y1="150" x2="500" y2="150" stroke="#ffffff" stroke-width="5"/>

  <line x1="500" y1="150" x2="500" y2="230" stroke="#ffffff" stroke-width="5"/>

  <line x1="500" y1="230" x2="100" y2="230" stroke="#ffffff" stroke-width="5"/>

  <line x1="100" y1="230" x2="100" y2="150" stroke="#ffffff" stroke-width="5"/>

  <!-- Battery -->
  <line x1="220" y1="120" x2="220" y2="180" stroke="#ffffff" stroke-width="5"/>
  <line x1="250" y1="110" x2="250" y2="190" stroke="#ffffff" stroke-width="8"/>

  <!-- Bulb -->
  <circle cx="380" cy="150" r="35" stroke="#FACC15" stroke-width="5"/>

  <line x1="355" y1="125" x2="405" y2="175" stroke="#FACC15" stroke-width="4"/>
  <line x1="405" y1="125" x2="355" y2="175" stroke="#FACC15" stroke-width="4"/>

  <!-- Labels -->
  <text x="210" y="95" fill="#ffffff" font-size="22" font-family="Arial">
    Battery
  </text>

  <text x="350" y="95" fill="#ffffff" font-size="22" font-family="Arial">
    Bulb
  </text>

</svg>