<svg width="600" height="350" viewBox="0 0 600 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="350" fill="#ffffff"/>

  <!-- Flask -->
  <circle cx="180" cy="200" r="60"
          fill="#dbeafe"
          stroke="#000"
          stroke-width="4"/>

  <rect x="165" y="90" width="30" height="60"
        fill="#dbeafe"
        stroke="#000"
        stroke-width="4"/>

  <!-- Liquid -->
  <path d="M125 220 Q180 250 235 220 L235 240 Q180 270 125 240 Z"
        fill="#60a5fa"/>

  <!-- Delivery tube -->
  <line x1="195" y1="110" x2="340" y2="110"
        stroke="#000"
        stroke-width="5"/>

  <line x1="340" y1="110" x2="430" y2="180"
        stroke="#000"
        stroke-width="5"/>

  <!-- Condenser -->
  <rect x="320" y="90" width="140" height="40"
        fill="#e0f2fe"
        stroke="#000"
        stroke-width="3"/>

  <!-- Receiver -->
  <rect x="460" y="170" width="60" height="100"
        fill="#dcfce7"
        stroke="#000"
        stroke-width="4"/>

  <!-- Burner -->
  <rect x="150" y="280" width="60" height="20"
        fill="#94a3b8"
        stroke="#000"
        stroke-width="3"/>

  <polygon points="180,240 165,280 195,280"
           fill="#f97316"/>

  <text x="170" y="330" font-size="24">
    Distillation Setup
  </text>
</svg>