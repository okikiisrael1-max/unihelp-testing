<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="500" fill="#ffffff"/>

  <!-- Stand -->
  <line x1="120" y1="40" x2="120" y2="430"
        stroke="#000"
        stroke-width="6"/>

  <line x1="70" y1="430" x2="180" y2="430"
        stroke="#000"
        stroke-width="6"/>

  <!-- Clamp -->
  <line x1="120" y1="100" x2="190" y2="100"
        stroke="#000"
        stroke-width="4"/>

  <!-- Burette -->
  <rect x="190" y="50" width="25" height="270"
        fill="#dbeafe"
        stroke="#000"
        stroke-width="3"/>

  <!-- Tap -->
  <rect x="180" y="320" width="45" height="10"
        fill="#94a3b8"
        stroke="#000"
        stroke-width="2"/>

  <!-- Tip -->
  <line x1="202" y1="330" x2="202" y2="360"
        stroke="#000"
        stroke-width="3"/>

  <!-- Flask -->
  <path d="M260 360 L320 360 L350 430 L230 430 Z"
        fill="#dcfce7"
        stroke="#000"
        stroke-width="3"/>

  <rect x="282" y="320" width="16" height="40"
        fill="#dcfce7"
        stroke="#000"
        stroke-width="3"/>

  <!-- Drop -->
  <circle cx="202" cy="350" r="4" fill="#2563eb"/>

  <text x="140" y="470" font-size="22">
    Titration Setup
  </text>
</svg>