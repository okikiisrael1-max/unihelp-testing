<svg width="220" height="500" viewBox="0 0 220 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="220" height="500" fill="#ffffff"/>

  <!-- Stand -->
  <line x1="40" y1="40" x2="40" y2="450" stroke="#000" stroke-width="6"/>
  <line x1="10" y1="450" x2="90" y2="450" stroke="#000" stroke-width="6"/>

  <!-- Clamp -->
  <line x1="40" y1="120" x2="90" y2="120" stroke="#000" stroke-width="4"/>

  <!-- Burette -->
  <rect x="90" y="40" width="25" height="320"
        fill="#e0f2fe"
        stroke="#000"
        stroke-width="3"/>

  <!-- Graduation marks -->
  <line x1="115" y1="70" x2="130" y2="70" stroke="#000" stroke-width="2"/>
  <line x1="115" y1="100" x2="130" y2="100" stroke="#000" stroke-width="2"/>
  <line x1="115" y1="130" x2="130" y2="130" stroke="#000" stroke-width="2"/>
  <line x1="115" y1="160" x2="130" y2="160" stroke="#000" stroke-width="2"/>
  <line x1="115" y1="190" x2="130" y2="190" stroke="#000" stroke-width="2"/>
  <line x1="115" y1="220" x2="130" y2="220" stroke="#000" stroke-width="2"/>
  <line x1="115" y1="250" x2="130" y2="250" stroke="#000" stroke-width="2"/>

  <!-- Stopcock -->
  <rect x="82" y="360" width="40" height="12"
        fill="#94a3b8"
        stroke="#000"
        stroke-width="2"/>

  <!-- Tip -->
  <line x1="102" y1="372" x2="102" y2="430"
        stroke="#000"
        stroke-width="3"/>

  <text x="65" y="480" font-size="22">
    Burette
  </text>
</svg>